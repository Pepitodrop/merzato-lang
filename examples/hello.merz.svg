<svg xmlns="http://www.w3.org/2000/svg" width="620" height="180" viewBox="0 0 620 180" role="img" aria-label="A Merzato program that prints Hi">
  <rect width="620" height="180" fill="#ffffff"/>
  <text x="24" y="32" font-family="monospace" font-size="18">THIS PAINTING IS EXECUTABLE. PLEASE DO NOT FEED IT.</text>

  <!-- Colour transitions encode PUSH, OUTC, PUSH, OUTC. -->
  <!-- Notes can come from data-note or from the paired hello.mid score. -->
  <rect data-order="0" data-note="60" data-value="72" x="40"  y="60" width="100" height="90" fill="#FFC0C0"/>
  <rect data-order="1" data-note="62"                 x="150" y="60" width="100" height="90" fill="#FF0000"/>
  <rect data-order="2" data-note="67" data-value="105" x="260" y="60" width="100" height="90" fill="#FFC0FF"/>
  <rect data-order="3" data-note="69"                 x="370" y="60" width="100" height="90" fill="#FF00FF"/>
  <rect data-order="4" data-note="74"                 x="480" y="60" width="100" height="90" fill="#C0C0FF"/>
</svg>
