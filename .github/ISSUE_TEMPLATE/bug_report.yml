name: Bug report
description: Report a reproducible compiler, VM, artwork, MIDI, CLI, or browser-host defect.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Merzato.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual and expected behaviour.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste the smallest `.mza` program or describe the SVG/MIDI files needed to reproduce it.
      render: shell
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v22.0.0
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected component
      options:
        - Assembly parser
        - Virtual machine
        - SVG art compiler
        - MIDI parser
        - MerzScript browser host
        - CLI
        - Playground
        - Documentation
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
